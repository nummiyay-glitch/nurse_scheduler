<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフトナビ</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useMemo } = React;

    // Icons
    const Calendar = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );

    const Users = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
    );

    const Clock = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    );

    const AlertCircle = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    );

    const RefreshCw = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    );

    const Check = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    );

    const AlertTriangle = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
    );

    const PlusIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );

    const TrashIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14H6L5 6"></path>
        <path d="M10 11v6M14 11v6"></path>
        <path d="M9 6V4h6v2"></path>
      </svg>
    );

    // 種別ごとの色設定（A=purple, B=blue, C=green, D=orange, E=pink）
    const TYPE_COLORS = {
      A: { dot: 'bg-purple-500', text: 'text-purple-600', badge: 'text-purple-500' },
      B: { dot: 'bg-blue-500',   text: 'text-blue-600',   badge: 'text-blue-500' },
      C: { dot: 'bg-green-500',  text: 'text-green-600',  badge: 'text-green-500' },
      D: { dot: 'bg-orange-500', text: 'text-orange-600', badge: 'text-orange-500' },
      E: { dot: 'bg-pink-500',   text: 'text-pink-600',   badge: 'text-pink-500' },
    };
    const DEFAULT_TYPE_COLOR = { dot: 'bg-gray-400', text: 'text-gray-600', badge: 'text-gray-500' };

    const getTypeColor = (typeKey) => TYPE_COLORS[typeKey] || DEFAULT_TYPE_COLOR;

    const NursingScheduleApp = () => {
      const timeSlots = ['9-10', '10-11', '11-12', '12-13', '13-14', '14-15', '15-16', '16-17'];

      // 種別の表示名（内部キーA/B/Cに対する表示ラベル）
      const [typeLabels, setTypeLabels] = useState({ A: 'A', B: 'B', C: 'C' });

      // 看護師一覧
      const [nurses, setNurses] = useState([
        { id: 1,  name: 'A1', type: 'A', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 2,  name: 'A2', type: 'A', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 3,  name: 'A3', type: 'A', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 4,  name: 'A4', type: 'A', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 5,  name: 'A5', type: 'A', isShortTime: true,  isLateStart: false, isAbsent: false, leaveType: null },
        { id: 6,  name: 'B1', type: 'B', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 7,  name: 'B2', type: 'B', isShortTime: true,  isLateStart: false, isAbsent: false, leaveType: null },
        { id: 8,  name: 'C1', type: 'C', isShortTime: false, isLateStart: false, isAbsent: false, leaveType: null },
        { id: 9,  name: 'C2', type: 'C', isShortTime: true,  isLateStart: false, isAbsent: false, leaveType: null },
      ]);
      const [nextId, setNextId] = useState(10);

      // 看護師追加フォームの状態
      const [newNurseName, setNewNurseName]           = useState('');
      const [newNurseType, setNewNurseType]           = useState('A');
      const [newNurseShortTime, setNewNurseShortTime] = useState(false);

      const [schedule, setSchedule]               = useState({});
      const [mainLeaderId, setMainLeaderId]       = useState(1);
      const [validationErrors, setValidationErrors] = useState([]);
      const [supportNeeded, setSupportNeeded]     = useState({});
      const [scheduleGenerated, setScheduleGenerated] = useState(false);
      const [breakStartTime, setBreakStartTime]   = useState(11);
      const [selectedCell, setSelectedCell]       = useState(null);
      const [nurseScheduleMap, setNurseScheduleMap] = useState({});

      const lateStartCount = useMemo(() =>
        nurses.filter(n => n.isLateStart && !n.isAbsent).length,
        [nurses]
      );

      // ===== 看護師追加・削除 =====
      const addNurse = () => {
        const name = newNurseName.trim();
        if (!name) { alert('名前を入力してください'); return; }
        setNurses(prev => [...prev, {
          id: nextId,
          name,
          type: newNurseType,
          isShortTime: newNurseShortTime,
          isLateStart: false,
          isAbsent: false,
          leaveType: null,
        }]);
        setNextId(n => n + 1);
        setNewNurseName('');
        setNewNurseShortTime(false);
      };

      const removeNurse = (nurseId) => {
        setNurses(prev => prev.filter(n => n.id !== nurseId));
        if (mainLeaderId === nurseId) {
          const remaining = nurses.filter(n => n.id !== nurseId && n.type === 'A' && !n.leaveType);
          if (remaining.length > 0) setMainLeaderId(remaining[0].id);
        }
      };

      // ===== 時短トグル =====
      const toggleShortTime = (nurseId) => {
        const nurse = nurses.find(n => n.id === nurseId);
        if (nurse.isLateStart) {
          alert('遅出と時短は併用できません');
          return;
        }
        setNurses(prev => prev.map(n =>
          n.id === nurseId ? { ...n, isShortTime: !n.isShortTime } : n
        ));
      };

      // ===== 種別変更 =====
      const changeNurseType = (nurseId, newType) => {
        setNurses(prev => prev.map(n =>
          n.id === nurseId ? { ...n, type: newType } : n
        ));
      };

      // ===== 遅出トグル =====
      const toggleLateStart = (nurseId) => {
        const nurse = nurses.find(n => n.id === nurseId);
        if (nurse.isShortTime) { alert('時短勤務者は遅出に設定できません'); return; }
        if (nurse.leaveType)   { alert('AM休/PM休と遅出は併用できません'); return; }
        setNurses(prev => prev.map(n =>
          n.id === nurseId ? { ...n, isLateStart: !n.isLateStart } : n
        ));
      };

      // ===== AM/PM休トグル =====
      const toggleLeaveType = (nurseId) => {
        const nurse = nurses.find(n => n.id === nurseId);
        if (nurse.isLateStart) { alert('遅出とAM休/PM休は併用できません'); return; }
        const nextLeaveType = nurse.leaveType === null ? 'AM' :
                              nurse.leaveType === 'AM' ? 'PM' : null;
        setNurses(prev => prev.map(n =>
          n.id === nurseId ? { ...n, leaveType: nextLeaveType } : n
        ));
      };

      // ===== 休務トグル =====
      const toggleAbsent = (nurseId) => {
        setNurses(prev => prev.map(n =>
          n.id === nurseId ? { ...n, isAbsent: !n.isAbsent, isLateStart: false, leaveType: null } : n
        ));
      };

      // ===== 名前更新 =====
      const updateNurseName = (nurseId, name) => {
        setNurses(prev => prev.map(n => n.id === nurseId ? { ...n, name } : n));
      };

      // ===== スケジュール生成 =====
      const generateSchedule = () => {
        console.clear();
        console.log('========================================');
        console.log('スケジュール生成開始');
        console.log('========================================');

        const errors = [];
        const newSchedule = {};
        const newSupportNeeded = {};

        const lateNurses = nurses.filter(n => n.isLateStart && !n.isAbsent);
        if (lateNurses.length === 0) {
          if (!confirm('遅出看護師が設定されていません。遅出なしで生成しますか？')) return;
        }

        const workingNurses = nurses.filter(n => !n.isAbsent);
        const aNurses  = workingNurses.filter(n => n.type === 'A');
        const bNurses  = workingNurses.filter(n => n.type === 'B');
        const cNurses  = workingNurses.filter(n => n.type === 'C');
        const abNurses = workingNurses.filter(n => n.type === 'A' || n.type === 'B');

        console.log('出勤者:', workingNurses.length, '人');
        console.log(`${typeLabels.A}看護師:`, aNurses.length, '人');
        console.log(`${typeLabels.B}看護師:`, bNurses.length, '人');
        console.log(`${typeLabels.C}看護師:`, cNurses.length, '人');

        if (aNurses.length < 2) {
          errors.push(`${typeLabels.A}看護師が不足しています（リーダー+代理で最低2人必要）`);
          setValidationErrors(errors);
          return;
        }

        let mainLeader = workingNurses.find(n => n.id === mainLeaderId && n.type === 'A' && !n.leaveType);
        if (!mainLeader) {
          mainLeader = aNurses.find(n => !n.leaveType);
          if (!mainLeader) {
            errors.push(`半休以外の${typeLabels.A}看護師が必要です（リーダー用）`);
            setValidationErrors(errors);
            return;
          }
          setMainLeaderId(mainLeader.id);
        }
        console.log('リーダー:', mainLeader.name, mainLeader.isLateStart ? '(遅出)' : '', mainLeader.isShortTime ? '(時短)' : '');

        const localScheduleMap = {};
        workingNurses.forEach(n => {
          localScheduleMap[n.id] = new Array(8).fill(null);
          if (n.leaveType === 'AM') {
            for (let i = 0; i < 3; i++) localScheduleMap[n.id][i] = 'AM休';
          }
          if (n.leaveType === 'PM') {
            for (let i = 3; i < 8; i++) localScheduleMap[n.id][i] = 'PM休';
          }
        });

        const shuffle = (array) => {
          const arr = [...array];
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        };

        // 遅出看護師は15時休憩固定
        const breakAssignments = {};
        lateNurses.forEach(n => {
          breakAssignments[n.id] = 6;
          localScheduleMap[n.id][6] = '休憩';
          console.log(`${n.name}: 15時休憩（遅出）`);
        });

        // AM休は14時休憩
        const amLeaveNurses = workingNurses.filter(n => n.leaveType === 'AM');
        amLeaveNurses.forEach(n => {
          breakAssignments[n.id] = 5;
          localScheduleMap[n.id][5] = '休憩';
          console.log(`${n.name}: 14時休憩（AM休）`);
        });

        const pmLeaveNurses = workingNurses.filter(n => n.leaveType === 'PM');
        pmLeaveNurses.forEach(n => { console.log(`${n.name}: 休憩なし（PM休）`); });

        const normalNurses = workingNurses.filter(n => !n.isLateStart && !n.leaveType);

        if (!mainLeader.isLateStart) {
          const leaderBreakSlot = 3;
          breakAssignments[mainLeader.id] = leaderBreakSlot;
          localScheduleMap[mainLeader.id][leaderBreakSlot] = '休憩';
          console.log(`${mainLeader.name}(リーダー): 12時休憩（固定）`);
        } else {
          console.log('遅出リーダーのため、9-10時はリーダー不在、12時休憩枠は別の人を配置');
        }

        const otherNormalNurses = shuffle(normalNurses.filter(n => n.id !== mainLeader.id));

        // =====================================================
        // 動的休憩スロットキュー生成
        // 目標: 12時台×2、13時台・14時台を均等 (2,3,3 / 2,2,3 etc.)
        // =====================================================
        const otherCount = otherNormalNurses.length;
        let breakSlotQueue = [];

        if (mainLeader.isLateStart) {
          // 遅出リーダー: slot6(15時)固定 → 12時(slot3)は完全フリー、2人入れる
          if (breakStartTime === 11) {
            if (otherCount >= 1) breakSlotQueue.push(2); // 11時に1人
            if (otherCount >= 2) breakSlotQueue.push(3); // 12時に1人目
            if (otherCount >= 3) breakSlotQueue.push(3); // 12時に2人目
            const rest = Math.max(0, otherCount - 3);
            const at13 = Math.floor(rest / 2);
            const at14 = rest - at13;
            for (let i = 0; i < at13; i++) breakSlotQueue.push(4);
            for (let i = 0; i < at14; i++) breakSlotQueue.push(5);
          } else {
            // breakStartTime === 12: 12時に2人
            if (otherCount >= 1) breakSlotQueue.push(3); // 12時に1人目
            if (otherCount >= 2) breakSlotQueue.push(3); // 12時に2人目
            const rest = Math.max(0, otherCount - 2);
            const at13 = Math.floor(rest / 2);
            const at14 = rest - at13;
            for (let i = 0; i < at13; i++) breakSlotQueue.push(4);
            for (let i = 0; i < at14; i++) breakSlotQueue.push(5);
          }
        } else {
          // 通常リーダー: slot3(12時)固定 → othersの12時にもう1人追加して合計2人
          if (breakStartTime === 11) {
            if (otherCount >= 1) breakSlotQueue.push(2); // 11時に1人
            if (otherCount >= 2) breakSlotQueue.push(3); // 12時にもう1人
            const rest = Math.max(0, otherCount - 2);
            const at13 = Math.floor(rest / 2);
            const at14 = rest - at13;
            for (let i = 0; i < at13; i++) breakSlotQueue.push(4);
            for (let i = 0; i < at14; i++) breakSlotQueue.push(5);
          } else {
            // breakStartTime === 12
            // 12時にもう1人（リーダーと同時刻OK）→ 合計12時×2
            if (otherCount >= 1) breakSlotQueue.push(3);
            // 残りを13時・14時に均等配分 → 2,3,3 / 2,2,3 など
            const rest = Math.max(0, otherCount - 1);
            const at13 = Math.floor(rest / 2);
            const at14 = rest - at13;
            for (let i = 0; i < at13; i++) breakSlotQueue.push(4);
            for (let i = 0; i < at14; i++) breakSlotQueue.push(5);
          }
        }

        // AM休の人が14時休憩に入る分、14時枠を減らす
        const amLeaveCount = amLeaveNurses.length;
        if (amLeaveCount > 0) {
          for (let i = 0; i < amLeaveCount; i++) {
            const idx = breakSlotQueue.lastIndexOf(5);
            if (idx !== -1) breakSlotQueue.splice(idx, 1);
          }
          console.log(`AM休${amLeaveCount}人のため、14時休憩枠を調整`);
        }

        otherNormalNurses.forEach((nurse, idx) => {
          if (idx < breakSlotQueue.length) {
            const slotIdx = breakSlotQueue[idx];
            breakAssignments[nurse.id] = slotIdx;
            localScheduleMap[nurse.id][slotIdx] = '休憩';
            console.log(`${nurse.name}: ${9 + slotIdx}時休憩`);
          }
        });

        const countBySlot = {};
        Object.values(breakAssignments).forEach(slot => {
          countBySlot[slot] = (countBySlot[slot] || 0) + 1;
        });
        console.log('休憩配分:', countBySlot);

        // リーダー配置（10-16時）
        for (let i = 1; i < 7; i++) {
          if (mainLeader.isLateStart && i === 0) continue;
          if (localScheduleMap[mainLeader.id][i] === null) {
            localScheduleMap[mainLeader.id][i] = 'リーダー';
          }
        }

        // 代理リーダー
        const deputyLeaderCandidates = aNurses.filter(n => n.id !== mainLeader.id && !n.leaveType);
        const leaderBreakIdx = breakAssignments[mainLeader.id];
        const availableDeputies = shuffle(deputyLeaderCandidates.filter(n =>
          localScheduleMap[n.id][leaderBreakIdx] === null &&
          !(n.isLateStart && leaderBreakIdx === 0) &&
          !(n.isShortTime && leaderBreakIdx === 7)
        ));

        if (availableDeputies.length > 0) {
          localScheduleMap[availableDeputies[0].id][leaderBreakIdx] = '代理リーダー';
          console.log(`${availableDeputies[0].name}: 代理リーダー（${9 + leaderBreakIdx}時）`);
        } else {
          errors.push('リーダー休憩中の代理を配置できません');
        }

        // 継続看護配置
        console.log('\n--- 継続看護配置 ---');
        const keizokuNurses = [];

        const keizoku1Candidates = shuffle(abNurses.filter(n => {
          if (n.id === mainLeader.id) return false;
          if (n.isLateStart) return false;
          for (let i = 0; i <= 2; i++) {
            if (localScheduleMap[n.id][i] !== null) return false;
          }
          return true;
        }));

        if (keizoku1Candidates.length > 0) {
          const k1 = keizoku1Candidates[0];
          for (let i = 0; i <= 2; i++) localScheduleMap[k1.id][i] = '継続看護';
          keizokuNurses.push(k1.id);
          console.log(`${k1.name}: 継続看護 9-12時`);
        } else {
          errors.push('9-12時の継続看護を配置できません');
        }

        const keizoku2Candidates = shuffle(abNurses.filter(n => {
          if (n.id === mainLeader.id) return false;
          if (keizokuNurses.includes(n.id)) return false;
          for (let i = 3; i <= 5; i++) {
            if (localScheduleMap[n.id][i] !== null) return false;
          }
          return true;
        }));

        if (keizoku2Candidates.length > 0) {
          const k2 = keizoku2Candidates[0];
          for (let i = 3; i <= 5; i++) localScheduleMap[k2.id][i] = '継続看護';
          keizokuNurses.push(k2.id);
          console.log(`${k2.name}: 継続看護 12-15時`);
        } else {
          console.log('12-15時の3時間連続配置不可 → 2時間+1時間に分割');
          const keizoku2aCandidates = shuffle(abNurses.filter(n => {
            if (n.id === mainLeader.id) return false;
            if (keizokuNurses.includes(n.id)) return false;
            for (let i = 3; i <= 4; i++) {
              if (localScheduleMap[n.id][i] !== null) return false;
            }
            return true;
          }));

          if (keizoku2aCandidates.length > 0) {
            const k2a = keizoku2aCandidates[0];
            for (let i = 3; i <= 4; i++) localScheduleMap[k2a.id][i] = '継続看護';
            keizokuNurses.push(k2a.id);
            console.log(`${k2a.name}: 継続看護 12-14時（分割前半）`);

            const keizoku2bCandidates = shuffle(abNurses.filter(n => {
              if (n.id === mainLeader.id) return false;
              if (keizokuNurses.includes(n.id)) return false;
              if (localScheduleMap[n.id][5] !== null) return false;
              return true;
            }));

            if (keizoku2bCandidates.length > 0) {
              const k2b = keizoku2bCandidates[0];
              localScheduleMap[k2b.id][5] = '継続看護';
              keizokuNurses.push(k2b.id);
              console.log(`${k2b.name}: 継続看護 14-15時（分割後半）`);
            } else {
              errors.push('14-15時の継続看護（分割後半）を配置できません');
            }
          } else {
            errors.push('12-15時の継続看護を配置できません（分割も不可）');
          }
        }

        // 穿刺配置
        console.log('\n--- 穿刺配置 ---');

        const getSenshiCandidates = (slotIdx) => {
          return workingNurses.filter(n => {
            if (n.id === mainLeader.id) return false;
            if (keizokuNurses.includes(n.id)) return false;
            if (localScheduleMap[n.id][slotIdx] !== null) return false;
            if (n.isLateStart && slotIdx === 0) return false;
            if (n.isShortTime && slotIdx === 7) return false;
            return true;
          });
        };

        const senshiCount = {};
        workingNurses.forEach(n => { senshiCount[n.id] = 0; });

        const canAssignSenshi = (nurseId) => senshiCount[nurseId] < 2;
        const assignSenshi = (nurseId, slotIdx) => {
          localScheduleMap[nurseId][slotIdx] = '穿刺';
          senshiCount[nurseId]++;
        };

        const senshiRequired = {
          0: 1, 1: 2, 2: 2, 3: 2, 4: 2, 5: 1, 6: 0, 7: 0
        };

        const priorityOrder = [2, 3, 1, 4, 5, 0];
        for (const slotIdx of priorityOrder) {
          const required = senshiRequired[slotIdx];
          if (required === 0) continue;

          let candidates = getSenshiCandidates(slotIdx).filter(n => canAssignSenshi(n.id));
          candidates.sort((a, b) => {
            const diff = senshiCount[a.id] - senshiCount[b.id];
            if (diff !== 0) return diff;
            return Math.random() - 0.5;
          });

          const assigned = [];
          for (let i = 0; i < required && i < candidates.length; i++) {
            assignSenshi(candidates[i].id, slotIdx);
            assigned.push(candidates[i].name);
          }

          console.log(`${timeSlots[slotIdx]}: 穿刺 ${assigned.join(', ')} (必要${required}人)`);
          if (assigned.length < required) {
            errors.push(`${timeSlots[slotIdx]}: 穿刺が${required - assigned.length}人不足`);
          }
        }

        // フロアで埋める
        console.log('\n--- フロア配置 ---');
        workingNurses.forEach(nurse => {
          for (let i = 0; i < 8; i++) {
            if (nurse.isLateStart && i === 0) continue;
            if (nurse.isShortTime && i === 7) continue;
            if (localScheduleMap[nurse.id][i] === null) {
              localScheduleMap[nurse.id][i] = 'フロア';
            }
          }
        });

        // フロア人数チェック
        console.log('\n--- フロア人数チェック ---');
        const minFloor = 4;

        for (let i = 0; i < 8; i++) {
          const floorCount = workingNurses.filter(n =>
            localScheduleMap[n.id][i] === 'フロア'
          ).length;

          const shortage = Math.max(0, minFloor - floorCount);
          if (shortage > 0) {
            newSupportNeeded[i] = shortage;
            console.log(`${timeSlots[i]}: フロア${floorCount}人 → 応援${shortage}人必要`);
          } else {
            console.log(`${timeSlots[i]}: フロア${floorCount}人 → OK`);
          }
        }

        timeSlots.forEach((slot, slotIdx) => {
          newSchedule[slot] = { tasks: {}, floorCount: 0, supportNeeded: newSupportNeeded[slotIdx] || 0 };
          workingNurses.forEach(nurse => {
            const task = localScheduleMap[nurse.id][slotIdx];
            if (task) {
              if (!newSchedule[slot].tasks[task]) newSchedule[slot].tasks[task] = [];
              newSchedule[slot].tasks[task].push(nurse.name);
              if (task === 'フロア') newSchedule[slot].floorCount++;
            }
          });
        });

        console.log('\n========== 最終結果 ==========');
        workingNurses.forEach(nurse => {
          console.log(`${nurse.name}:`, localScheduleMap[nurse.id]);
        });

        const totalSupport = Object.values(newSupportNeeded).reduce((a, b) => a + b, 0);
        const maxSimultaneous = Math.max(0, ...Object.values(newSupportNeeded));
        console.log(`応援必要: 延べ${totalSupport}人、最大同時${maxSimultaneous}人`);

        setSchedule(newSchedule);
        setSupportNeeded(newSupportNeeded);
        setValidationErrors(errors);
        setScheduleGenerated(true);
        setNurseScheduleMap(localScheduleMap);
        setSelectedCell(null);

        console.log('========================================');
        console.log('スケジュール生成完了');
        console.log('========================================');
      };

      // 個人別スケジュール取得
      const getNurseSchedule = (nurseId) => {
        const nurse = nurses.find(n => n.id === nurseId);
        if (nurse.isAbsent) return timeSlots.map(() => '休務');
        if (!scheduleGenerated || !nurseScheduleMap[nurseId]) {
          return timeSlots.map((_, idx) => {
            if (nurse.isLateStart && idx === 0) return '-';
            if (nurse.isShortTime && idx === 7) return '-';
            return '-';
          });
        }
        return nurseScheduleMap[nurseId].map((task, idx) => {
          if (nurse.isLateStart && idx === 0) return '-';
          if (nurse.isShortTime && idx === 7) return '-';
          return task || '-';
        });
      };

      // セルクリック（入れ替え）
      const handleCellClick = (nurse, slotIdx, task) => {
        if (task === '休憩' || task === '休務' || task === '-' || task === 'AM休' || task === 'PM休') {
          setSelectedCell(null);
          return;
        }

        if (!selectedCell) {
          setSelectedCell({ nurseId: nurse.id, nurseName: nurse.name, slotIdx, task });
        } else if (selectedCell.nurseId === nurse.id && selectedCell.slotIdx === slotIdx) {
          setSelectedCell(null);
        } else {
          const targetTask = task;
          if (targetTask === '休憩' || targetTask === '休務' || targetTask === '-' || targetTask === 'AM休' || targetTask === 'PM休') {
            setSelectedCell(null);
            return;
          }

          const newMap = {};
          Object.keys(nurseScheduleMap).forEach(id => { newMap[id] = [...nurseScheduleMap[id]]; });

          if (selectedCell.slotIdx === slotIdx) {
            const temp = newMap[selectedCell.nurseId][slotIdx];
            newMap[selectedCell.nurseId][slotIdx] = newMap[nurse.id][slotIdx];
            newMap[nurse.id][slotIdx] = temp;
          } else {
            if (selectedCell.nurseId === nurse.id) {
              const temp = newMap[nurse.id][selectedCell.slotIdx];
              newMap[nurse.id][selectedCell.slotIdx] = newMap[nurse.id][slotIdx];
              newMap[nurse.id][slotIdx] = temp;
            } else {
              const temp = newMap[selectedCell.nurseId][selectedCell.slotIdx];
              newMap[selectedCell.nurseId][selectedCell.slotIdx] = newMap[nurse.id][slotIdx];
              newMap[nurse.id][slotIdx] = temp;
            }
          }

          setNurseScheduleMap(newMap);
          recalculateSupport(newMap);
          setSelectedCell(null);
        }
      };

      const recalculateSupport = (scheduleMap) => {
        const workingNurses = nurses.filter(n => !n.isAbsent);
        const minFloor = 4;
        const newSupportNeeded = {};

        for (let i = 0; i < 8; i++) {
          const floorCount = workingNurses.filter(n =>
            scheduleMap[n.id] && scheduleMap[n.id][i] === 'フロア'
          ).length;
          const shortage = Math.max(0, minFloor - floorCount);
          if (shortage > 0) newSupportNeeded[i] = shortage;
        }
        setSupportNeeded(newSupportNeeded);
      };

      const totalSupportNeeded = Object.values(supportNeeded).reduce((a, b) => a + b, 0);

      // 表示用ラベル取得
      const getTypeLabel = (typeKey) => typeLabels[typeKey] || typeKey;

      // 利用可能な種別キー（A, B, C）
      const availableTypeKeys = ['A', 'B', 'C'];

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div className="max-w-7xl mx-auto">

            {/* ヘッダー */}
            <div className="bg-white rounded-2xl shadow-xl p-6 mb-4">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <Calendar className="w-8 h-8 text-indigo-600" />
                  <h1 className="text-2xl font-bold text-gray-800">シフトナビ</h1>
                </div>
                <button
                  onClick={generateSchedule}
                  className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition-colors shadow-md"
                >
                  <RefreshCw className="w-5 h-5" />
                  スケジュール生成
                </button>
              </div>

              {validationErrors.filter(e => !e.includes('応援')).length > 0 && (
                <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded">
                  <div className="flex items-start">
                    <AlertCircle className="w-5 h-5 text-red-500 mr-2 mt-0.5" />
                    <div>
                      <h3 className="font-semibold text-red-800 mb-1">エラー</h3>
                      <ul className="text-sm text-red-700 space-y-1">
                        {validationErrors.filter(e => !e.includes('応援')).map((error, idx) => (
                          <li key={idx}>• {error}</li>
                        ))}
                      </ul>
                    </div>
                  </div>
                </div>
              )}

              {scheduleGenerated && validationErrors.filter(e => !e.includes('応援')).length === 0 && (
                <div className="bg-green-50 border-l-4 border-green-500 p-4 mb-4 rounded">
                  <div className="flex items-center">
                    <Check className="w-5 h-5 text-green-500 mr-2" />
                    <span className="font-semibold text-green-800">スケジュール生成完了</span>
                  </div>
                </div>
              )}
            </div>

            {/* 設定パネル */}
            <div className="bg-white rounded-xl shadow-lg p-4 mb-4">
              <div className="flex items-center gap-2 mb-3">
                <Users className="w-5 h-5 text-indigo-600" />
                <h2 className="text-lg font-semibold text-gray-800">看護師設定</h2>
              </div>

              {/* 種別名称・リーダー・休憩開始 */}
              <div className="grid md:grid-cols-4 gap-4 mb-4">
                {/* 種別名称 */}
                <div className="md:col-span-1">
                  <label className="block text-sm font-medium text-gray-700 mb-1">種別名称</label>
                  <div className="flex gap-1">
                    {availableTypeKeys.map(key => {
                      const color = getTypeColor(key);
                      return (
                        <div key={key} className="flex-1 flex items-center gap-1">
                          <span className={`w-3 h-3 rounded-full flex-shrink-0 ${color.dot}`}></span>
                          <input
                            type="text"
                            value={typeLabels[key] || key}
                            onChange={e => setTypeLabels(prev => ({ ...prev, [key]: e.target.value }))}
                            className="w-full px-2 py-1.5 border border-gray-300 rounded text-sm text-center font-semibold"
                            maxLength={4}
                          />
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* リーダー */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">リーダー</label>
                  <select
                    value={mainLeaderId}
                    onChange={e => setMainLeaderId(parseInt(e.target.value))}
                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
                  >
                    {nurses.filter(n => n.type === 'A' && !n.isAbsent && !n.leaveType).map(nurse => (
                      <option key={nurse.id} value={nurse.id}>
                        {nurse.name}{nurse.isLateStart ? '(遅出)' : ''}{nurse.isShortTime ? '(時短)' : ''}
                      </option>
                    ))}
                  </select>
                </div>

                {/* 休憩開始 */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">休憩開始時間</label>
                  <select
                    value={breakStartTime}
                    onChange={e => setBreakStartTime(parseInt(e.target.value))}
                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
                  >
                    <option value={11}>11時開始</option>
                    <option value={12}>12時開始</option>
                  </select>
                </div>

                {/* 遅出カウント */}
                <div className={`p-2 rounded-lg ${lateStartCount >= 1 ? 'bg-blue-100' : 'bg-gray-100'} flex items-center`}>
                  <Clock className="w-4 h-4 mr-2" />
                  <span className="text-sm font-semibold">遅出: {lateStartCount}人</span>
                </div>
              </div>

              {/* 看護師リスト */}
              <div className="grid md:grid-cols-3 gap-2 mb-4">
                {nurses.map(nurse => {
                  const color = getTypeColor(nurse.type);
                  return (
                    <div
                      key={nurse.id}
                      className={`p-2 rounded-lg border ${
                        nurse.isAbsent ? 'bg-gray-100 opacity-60' :
                        nurse.isLateStart ? 'bg-blue-50 border-blue-300' :
                        nurse.leaveType === 'AM' ? 'bg-orange-50 border-orange-300' :
                        nurse.leaveType === 'PM' ? 'bg-purple-50 border-purple-300' :
                        'bg-white'
                      }`}
                    >
                      {/* 1行目: ドット + 名前 + 種別セレクト + 削除 */}
                      <div className="flex items-center gap-1 mb-1">
                        <span className={`w-3 h-3 rounded-full flex-shrink-0 ${color.dot}`}></span>
                        <input
                          type="text"
                          value={nurse.name}
                          onChange={e => updateNurseName(nurse.id, e.target.value)}
                          className="flex-1 px-2 py-1 border rounded text-sm min-w-0"
                          disabled={nurse.isAbsent}
                        />
                        {/* 種別変更 */}
                        <select
                          value={nurse.type}
                          onChange={e => changeNurseType(nurse.id, e.target.value)}
                          disabled={nurse.isAbsent}
                          className="px-1 py-1 border rounded text-xs bg-white"
                        >
                          {availableTypeKeys.map(k => (
                            <option key={k} value={k}>{typeLabels[k] || k}</option>
                          ))}
                        </select>
                        {/* 削除ボタン */}
                        <button
                          onClick={() => {
                            if (nurses.length <= 1) { alert('看護師は1人以上必要です'); return; }
                            if (!confirm(`${nurse.name}を削除しますか？`)) return;
                            removeNurse(nurse.id);
                          }}
                          className="p-1 text-red-400 hover:text-red-600 hover:bg-red-50 rounded flex-shrink-0"
                          title="削除"
                        >
                          <TrashIcon className="w-3.5 h-3.5" />
                        </button>
                      </div>

                      {/* 2行目: 時短 / 遅出 / 半休 / 休務 */}
                      <div className="flex items-center gap-1">
                        {/* 時短トグル */}
                        {!nurse.isAbsent && (
                          <button
                            onClick={() => toggleShortTime(nurse.id)}
                            className={`px-1.5 py-1 rounded text-xs font-semibold flex-shrink-0 ${
                              nurse.isShortTime
                                ? 'bg-yellow-400 text-yellow-900'
                                : 'bg-gray-200 text-gray-500 hover:bg-yellow-100'
                            }`}
                          >
                            時短
                          </button>
                        )}
                        {/* 遅出（時短でない場合のみ） */}
                        {!nurse.isShortTime && !nurse.isAbsent && (
                          <button
                            onClick={() => toggleLateStart(nurse.id)}
                            className={`px-1.5 py-1 rounded text-xs font-semibold flex-shrink-0 ${
                              nurse.isLateStart
                                ? 'bg-blue-500 text-white'
                                : 'bg-gray-200 text-gray-600 hover:bg-blue-100'
                            }`}
                          >
                            遅出
                          </button>
                        )}
                        {/* 半休 */}
                        {!nurse.isAbsent && (
                          <button
                            onClick={() => toggleLeaveType(nurse.id)}
                            className={`px-1.5 py-1 rounded text-xs font-semibold flex-shrink-0 ${
                              nurse.leaveType === 'AM'
                                ? 'bg-orange-500 text-white'
                                : nurse.leaveType === 'PM'
                                  ? 'bg-purple-500 text-white'
                                  : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                            }`}
                          >
                            {nurse.leaveType === 'AM' ? 'AM休' : nurse.leaveType === 'PM' ? 'PM休' : '半休'}
                          </button>
                        )}
                        {/* 休務 */}
                        <button
                          onClick={() => toggleAbsent(nurse.id)}
                          className={`px-1.5 py-1 rounded text-xs font-semibold flex-shrink-0 ${
                            nurse.isAbsent
                              ? 'bg-green-500 text-white'
                              : 'bg-orange-200 text-orange-700 hover:bg-orange-300'
                          }`}
                        >
                          {nurse.isAbsent ? '復帰' : '休務'}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* 看護師追加フォーム */}
              <div className="border-t pt-3">
                <p className="text-sm font-medium text-gray-700 mb-2 flex items-center gap-1">
                  <PlusIcon className="w-4 h-4 text-indigo-500" />
                  看護師を追加
                </p>
                <div className="flex flex-wrap gap-2 items-center">
                  <input
                    type="text"
                    placeholder="名前"
                    value={newNurseName}
                    onChange={e => setNewNurseName(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addNurse()}
                    className="px-3 py-2 border border-gray-300 rounded-lg text-sm w-28"
                  />
                  <select
                    value={newNurseType}
                    onChange={e => setNewNurseType(e.target.value)}
                    className="px-3 py-2 border border-gray-300 rounded-lg text-sm"
                  >
                    {availableTypeKeys.map(k => (
                      <option key={k} value={k}>{typeLabels[k] || k}種別</option>
                    ))}
                  </select>
                  <button
                    onClick={() => setNewNurseShortTime(v => !v)}
                    className={`px-3 py-2 rounded-lg text-sm font-semibold ${
                      newNurseShortTime
                        ? 'bg-yellow-400 text-yellow-900'
                        : 'bg-gray-200 text-gray-600 hover:bg-yellow-100'
                    }`}
                  >
                    {newNurseShortTime ? '時短: ON' : '時短: OFF'}
                  </button>
                  <button
                    onClick={addNurse}
                    className="flex items-center gap-1 px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600"
                  >
                    <PlusIcon className="w-4 h-4" />
                    追加
                  </button>
                </div>
              </div>
            </div>

            {/* スケジュール表 */}
            {scheduleGenerated && (
              <div className="bg-white rounded-xl shadow-lg p-4">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-lg font-semibold text-gray-800">スケジュール表</h2>
                  {selectedCell && (
                    <span className="text-sm text-blue-600 bg-blue-100 px-3 py-1 rounded">
                      入れ替え中: {selectedCell.nurseName} の {timeSlots[selectedCell.slotIdx]}
                    </span>
                  )}
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full border-collapse text-sm">
                    <thead>
                      <tr className="bg-purple-600 text-white">
                        <th className="border px-3 py-2">看護師</th>
                        {timeSlots.map(slot => (
                          <th key={slot} className="border px-3 py-2 whitespace-nowrap">{slot}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {nurses.filter(n => !n.isAbsent).map((nurse, idx) => {
                        const color = getTypeColor(nurse.type);
                        return (
                          <tr key={nurse.id} className={idx % 2 === 0 ? 'bg-gray-50' : ''}>
                            <td className="border px-3 py-2 font-semibold">
                              <div className="flex items-center gap-2">
                                <span className={`w-3 h-3 rounded-full ${color.dot}`}></span>
                                {nurse.name}
                                <span className={`text-xs ${color.badge}`}>({getTypeLabel(nurse.type)})</span>
                                {nurse.isShortTime && <span className="text-xs text-yellow-600">(時短)</span>}
                                {nurse.isLateStart && <span className="text-xs text-blue-600">(遅出)</span>}
                                {nurse.leaveType === 'AM' && <span className="text-xs text-orange-600">(AM休)</span>}
                                {nurse.leaveType === 'PM' && <span className="text-xs text-purple-600">(PM休)</span>}
                              </div>
                            </td>
                            {getNurseSchedule(nurse.id).map((task, slotIdx) => (
                              <td
                                key={slotIdx}
                                onClick={() => handleCellClick(nurse, slotIdx, task)}
                                className={`border px-2 py-2 text-center text-xs cursor-pointer hover:opacity-80 ${
                                  selectedCell?.nurseId === nurse.id && selectedCell?.slotIdx === slotIdx
                                    ? 'ring-2 ring-blue-500' : ''
                                } ${
                                  task === '休憩' ? 'bg-yellow-200 font-semibold' :
                                  task === '休務' ? 'bg-orange-200' :
                                  task === 'リーダー' ? 'bg-purple-200 font-semibold' :
                                  task === '代理リーダー' ? 'bg-purple-100' :
                                  task === '穿刺' ? 'bg-red-200 font-semibold' :
                                  task === '継続看護' ? 'bg-blue-200 font-semibold' :
                                  task === 'フロア' ? 'bg-gray-100' :
                                  task === 'AM休' ? 'bg-orange-100' :
                                  task === 'PM休' ? 'bg-purple-100' :
                                  task === '-' ? 'bg-gray-300' : ''
                                }`}
                              >
                                {task}
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                      {/* 応援行 */}
                      <tr className="bg-red-50">
                        <td className="border px-3 py-2 font-bold text-red-700">応援</td>
                        {timeSlots.map((slot, slotIdx) => {
                          const needed = supportNeeded[slotIdx] || 0;
                          return (
                            <td
                              key={slotIdx}
                              className={`border px-2 py-2 text-center ${
                                needed > 0 ? 'font-bold text-red-600 text-lg' : 'text-gray-400'
                              }`}
                            >
                              {needed > 0 ? needed : '-'}
                            </td>
                          );
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div className="mt-3 text-sm text-gray-500">
                  ※ セルをクリックして別のセルをクリックすると業務を入れ替えられます
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NursingScheduleApp />);
  </script>
</body>
</html>
